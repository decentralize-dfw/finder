<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finder — xrweb.studio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --sidebar:   #111318;
      --border:    #1e2130;
      --accent:    #5affd1;
      --accent2:   #ff5a8a;
      --text:      #c8cdd8;
      --muted:     #4a5068;
      --active-bg: #1a1d2a;
      --hover-bg:  #151825;
      --w-sidebar: 15%;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    /* ── LAYOUT ─────────────────────────────── */
    #app {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* ── SIDEBAR ────────────────────────────── */
    #sidebar {
      width: var(--w-sidebar);
      min-width: 160px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    #sidebar-header {
      padding: 18px 14px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #sidebar-header h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    #repo-info {
      margin-top: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      color: var(--muted);
      word-break: break-all;
      line-height: 1.6;
      white-space: pre-line;
    }

    #file-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    #file-list::-webkit-scrollbar { width: 3px; }
    #file-list::-webkit-scrollbar-track { background: transparent; }
    #file-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      cursor: pointer;
      transition: background .15s;
      border-left: 2px solid transparent;
      overflow: hidden;
    }

    .file-item:hover  { background: var(--hover-bg); }

    .file-item.active {
      background: var(--active-bg);
      border-left-color: var(--accent);
    }

    .file-icon {
      font-size: 11px;
      flex-shrink: 0;
      opacity: .5;
    }
    .file-item.active .file-icon { opacity: 1; color: var(--accent); }

    .file-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .file-item.active .file-name { color: var(--accent); }

    .file-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent2);
      flex-shrink: 0;
      opacity: 0;
      transition: opacity .15s;
    }
    .file-item.active .file-dot { opacity: 1; }

    #sidebar-footer {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #file-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--muted);
    }

    /* ── MAIN ───────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    #topbar {
      height: 40px;
      background: var(--sidebar);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      flex-shrink: 0;
    }

    #current-file {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #open-tab {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
      white-space: nowrap;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    #open-tab:hover { border-color: var(--accent); color: var(--accent); }

    #viewer-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #viewer {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #fff;
    }

    /* placeholder */
    #placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      pointer-events: none;
    }
    #placeholder.hidden { display: none; }

    .ph-icon { font-size: 38px; opacity: .2; }

    .ph-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    /* loading bar */
    #loading-bar {
      position: absolute;
      top: 0; left: 0;
      height: 2px;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      z-index: 10;
    }
    #loading-bar.active { width: 70%;  transition: width 1.5s ease-out; }
    #loading-bar.done   { width: 100%; opacity: 0; transition: width .2s, opacity .4s .2s; }

    /* error banner */
    #error-banner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--bg);
    }
    #error-banner.hidden { display: none; }

    .err-icon { font-size: 32px; }
    .err-msg {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent2);
      text-align: center;
      max-width: 380px;
      line-height: 1.7;
      white-space: pre-line;
    }

    /* scan overlay */
    #scan-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 100;
      transition: opacity .4s;
    }
    #scan-overlay.hidden { opacity: 0; pointer-events: none; }

    .scan-logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: .08em;
    }

    .scan-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    .scan-progress {
      width: 200px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .scan-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      animation: scanAnim 1.2s ease-in-out forwards;
    }

    @keyframes scanAnim {
      0%   { width: 0%; }
      60%  { width: 85%; }
      100% { width: 100%; }
    }
  </style>
</head>
<body>

<!-- scan overlay -->
<div id="scan-overlay">
  <div class="scan-logo">◈ finder</div>
  <div class="scan-sub" id="scan-msg">Scanning repository…</div>
  <div class="scan-progress"><div class="scan-bar"></div></div>
</div>

<div id="app">
  <!-- sidebar -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <h1>◈ HTML Files</h1>
      <div id="repo-info">decentralize-dfw/finder
xrweb.studio/finder</div>
    </div>
    <div id="file-list"></div>
    <div id="sidebar-footer">
      <div id="file-count">loading…</div>
    </div>
  </aside>

  <!-- main viewer -->
  <main id="main">
    <div id="topbar">
      <span id="current-file">select a file</span>
      <a id="open-tab" href="#" target="_blank">↗ open in new tab</a>
    </div>
    <div id="viewer-wrap">
      <div id="loading-bar"></div>

      <div id="placeholder">
        <div class="ph-icon">⌁</div>
        <div class="ph-text">Select an HTML file from the left panel<br>to preview it here</div>
      </div>

      <div id="error-banner" class="hidden">
        <div class="err-icon">⚠</div>
        <div class="err-msg" id="error-msg">—</div>
      </div>

      <iframe id="viewer" src="about:blank" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    </div>
  </main>
</div>

<script>
  /* ── CONFIG ─────────────────────────────────────────────────────── */
  const REPO_USER   = 'decentralize-dfw';
  const REPO_NAME   = 'finder';
  const REPO_BRANCH = 'main';
  const BASE_URL    = 'https://xrweb.studio/finder';   // custom domain
  const GITHUB_API  = 'https://api.github.com';

  /* ── HELPERS ────────────────────────────────────────────────────── */
  const $  = id => document.getElementById(id);
  const el = (tag, cls) => { const e = document.createElement(tag); if (cls) e.className = cls; return e; };

  /* ── LIVE URL FOR A FILE ────────────────────────────────────────── */
  function liveUrl(path) {
    return `${BASE_URL}/${path}`;
  }

  /* ── FETCH ALL HTML FILES VIA GITHUB TREE API ───────────────────── */
  async function fetchHtmlFiles() {
    const url = `${GITHUB_API}/repos/${REPO_USER}/${REPO_NAME}/git/trees/${REPO_BRANCH}?recursive=1`;
    const res = await fetch(url, { headers: { Accept: 'application/vnd.github.v3+json' } });
    if (!res.ok) throw new Error(`GitHub API error: ${res.status} ${res.statusText}`);
    const data = await res.json();
    if (data.truncated) console.warn('Repo tree truncated — some files may be missing.');
    return (data.tree || [])
      .filter(f => f.type === 'blob' && f.path.endsWith('.html'))
      .map(f => f.path);
  }

  /* ── LOADING BAR ────────────────────────────────────────────────── */
  let lbTimer;
  function loadStart() {
    const lb = $('loading-bar');
    lb.className = '';
    lb.style.opacity = '1';
    void lb.offsetWidth;
    lb.className = 'active';
  }
  function loadDone() {
    const lb = $('loading-bar');
    lb.className = 'done';
    clearTimeout(lbTimer);
    lbTimer = setTimeout(() => { lb.className = ''; }, 700);
  }

  /* ── STATE ──────────────────────────────────────────────────────── */
  let activeItem = null;

  /* ── SHOW FILE IN IFRAME ────────────────────────────────────────── */
  function showFile(path) {
    $('current-file').textContent = path;
    const url = liveUrl(path);
    $('open-tab').href = url;

    $('placeholder').classList.add('hidden');
    $('error-banner').classList.add('hidden');

    loadStart();

    const iframe  = $('viewer');
    iframe.src    = url;
    iframe.onload = () => loadDone();
    iframe.onerror = () => {
      loadDone();
      $('error-banner').classList.remove('hidden');
      $('error-msg').textContent = `Could not load file:\n${url}`;
    };
  }

  /* ── BUILD SIDEBAR ──────────────────────────────────────────────── */
  function buildSidebar(files) {
    const list = $('file-list');
    list.innerHTML = '';

    files.forEach(path => {
      const item = el('div', 'file-item');
      item.dataset.path = path;

      const icon = el('span', 'file-icon');
      icon.textContent = '◻';

      const name = el('span', 'file-name');
      name.textContent = path;
      name.title = path;

      const dot = el('span', 'file-dot');

      item.append(icon, name, dot);
      item.addEventListener('click', () => {
        if (activeItem) {
          activeItem.classList.remove('active');
          activeItem.querySelector('.file-icon').textContent = '◻';
        }
        item.classList.add('active');
        icon.textContent = '◼';
        activeItem = item;
        showFile(path);
      });

      list.appendChild(item);
    });

    $('file-count').textContent = `${files.length} file${files.length !== 1 ? 's' : ''} · ${REPO_BRANCH}`;
  }

  /* ── SIDEBAR ERROR ──────────────────────────────────────────────── */
  function sidebarError(msg) {
    $('file-list').innerHTML =
      `<div style="padding:14px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#ff5a8a;line-height:1.7;">${msg}</div>`;
    $('file-count').textContent = '0 files';
  }

  /* ── INIT ───────────────────────────────────────────────────────── */
  async function init() {
    const overlay = $('scan-overlay');
    $('scan-msg').textContent = `${REPO_USER}/${REPO_NAME} · ${REPO_BRANCH}`;

    try {
      const files = await fetchHtmlFiles();
      overlay.classList.add('hidden');

      if (!files.length) {
        sidebarError('No .html files found in this repository.');
        return;
      }

      buildSidebar(files);

      // auto-select first non-index file
      const first     = files.find(f => f !== 'index.html') || files[0];
      const firstItem = $('file-list').querySelector(`[data-path="${CSS.escape(first)}"]`);
      if (firstItem) firstItem.click();

    } catch (err) {
      overlay.classList.add('hidden');
      sidebarError(`Error: ${err.message}<br><br>Make sure the repository is public<br>and GitHub Pages is enabled.`);
    }
  }

  setTimeout(init, 1400);
</script>
</body>
</html>
